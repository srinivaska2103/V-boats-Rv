<!DOCTYPE html>
<html lang="en" x-data="{ darkMode: localStorage.getItem('theme') === 'dark', rtl: localStorage.getItem('dir') === 'rtl' }" 
      :class="darkMode ? 'dark' : ''" :dir="rtl ? 'rtl' : 'ltr'">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
       <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Cpath d='M5 5L20 35L35 5' stroke='%232563eb' stroke-width='6' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cpath d='M12 5L20 22L28 5' stroke='%2393c5fd' stroke-width='4' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">

    <title>Book Now | V-Boats & RV</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } } }
    </script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 transition-colors duration-300 font-sans">

    <!-- Header -->
    <header class="flex justify-between items-center p-6 md:px-12 w-full border-b border-slate-200 dark:border-slate-800">
        <a href="index.html" class="flex items-center space-x-2">
            <svg class="w-10 h-10" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M5 5L20 35L35 5" stroke="#2563eb" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M12 5L20 22L28 5" stroke="#93c5fd" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span class="text-xl font-bold tracking-tight">V-Boats & RV</span>
        </a>
        <div class="flex items-center gap-2">
            <button @click="darkMode = !darkMode; localStorage.setItem('theme', darkMode ? 'dark' : 'light')" 
                    class="w-10 h-10 flex items-center justify-center bg-slate-200 dark:bg-slate-800 rounded-lg hover:scale-105 transition-transform">☀️</button>
            <button @click="rtl = !rtl; localStorage.setItem('dir', rtl ? 'rtl' : 'ltr')" 
                    class="w-10 h-10 flex items-center justify-center bg-slate-200 dark:bg-slate-800 rounded-lg text-xs font-bold dark:text-white hover:scale-105 transition-transform">LTR</button>
        </div>
    </header>

    <!-- Booking Main Section -->
    <main class="py-16 px-4">
        <div class="max-w-3xl mx-auto" x-data="{ step: 1, service: '' }">
            
            <div class="text-center mb-12">
                <h1 class="text-4xl font-bold mb-4">Book Your Service</h1>
                <p class="text-slate-500 dark:text-slate-400 font-medium">Select your details and get a professional quote instantly.</p>
            </div>

            <!-- Progress Bar -->
            <div class="mb-8">
                <div class="flex justify-between text-xs font-bold uppercase tracking-widest text-slate-400 mb-2">
                    <span>Progress</span>
                    <span x-text="step + '/3'"></span>
                </div>
                <div class="w-full bg-slate-200 dark:bg-slate-800 h-2 rounded-full overflow-hidden">
                    <div class="bg-blue-600 h-full transition-all duration-500" :style="'width: ' + (step * 33.3) + '%'"></div>
                </div>
            </div>

            <form class="bg-white dark:bg-slate-900 p-8 md:p-12 rounded-[2.5rem] shadow-xl border border-slate-200 dark:border-slate-800 space-y-8">
                
                <!-- Step 1 -->
                <div x-show="step === 1" x-transition>
                    <h3 class="text-xl font-bold mb-6">1. Choose your service</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <template x-for="item in ['Basic Exterior Wash', 'Premium Detailing', 'Interior Deep Clean', 'Full Service']">
                            <label @click="service = item" 
                                   :class="service === item ? 'border-blue-600 bg-blue-50 dark:bg-blue-900/20' : 'border-slate-200 dark:border-slate-700'"
                                   class="p-4 border-2 rounded-2xl cursor-pointer hover:border-blue-600 transition-all flex items-center gap-3">
                                <input type="radio" name="service" class="accent-blue-600" :value="item" x-model="service">
                                <span class="font-semibold" x-text="item"></span>
                            </label>
                        </template>
                    </div>
                </div>

                <!-- Step 2 -->
                <div x-show="step === 2" x-transition>
                    <h3 class="text-xl font-bold mb-6">2. Preferred Date & Time</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input type="date" class="w-full p-4 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 outline-none focus:ring-2 focus:ring-blue-600">
                        <select class="w-full p-4 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 outline-none focus:ring-2 focus:ring-blue-600">
                            <option>Morning (9am - 12pm)</option>
                            <option>Afternoon (1pm - 5pm)</option>
                        </select>
                    </div>
                </div>

                <!-- Step 3 -->
                <div x-show="step === 3" x-transition>
                    <h3 class="text-xl font-bold mb-6">3. Contact Details</h3>
                    <div class="space-y-4">
                        <input type="text" placeholder="Full Name" class="w-full p-4 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 outline-none focus:ring-2 focus:ring-blue-600">
                        <input type="email" placeholder="Email Address" class="w-full p-4 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 outline-none focus:ring-2 focus:ring-blue-600">
                        <input type="tel" placeholder="Phone Number" class="w-full p-4 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 outline-none focus:ring-2 focus:ring-blue-600">
                    </div>
                </div>

                <!-- Nav -->
                <div class="flex justify-between pt-8 border-t border-slate-200 dark:border-slate-800">
                    <button type="button" @click="step--" x-show="step > 1" class="px-6 py-3 font-bold text-slate-500 hover:text-slate-800 dark:hover:text-slate-200 transition-colors">Back</button>
                    <button type="button" @click="step++" x-show="step < 3" class="px-8 py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 ml-auto transition-all active:scale-95">Next Step</button>
                    <button type="submit" x-show="step === 3" class="px-8 py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-emerald-700 ml-auto transition-all active:scale-95 shadow-lg shadow-emerald-600/20">Confirm Booking</button>
                </div>
            </form>
        </div>
    </main>

</body>
</html>
